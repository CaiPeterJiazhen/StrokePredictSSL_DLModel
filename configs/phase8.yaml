  - "M15b_prop_summary_eeg_best_ml"
fast:
  bootstrap_resamples: 25
  permutation_resamples: 25
full:
  bootstrap_resamples: 1000
  permutation_resamples: 1000
m16_full62_full_mode_enabled: false
