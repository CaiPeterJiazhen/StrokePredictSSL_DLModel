input_paths:
  cohort: "../../../outputs/cohort/cohort_master.csv"
  folds: "../../../outputs/folds/outer_folds.json"
  psd_eo: "../../../outputs/features/matrices/psd_eo.npy"
  psd_ec: "../../../outputs/features/matrices/psd_ec.npy"
